<!DOCTYPE html>
<html>
<head>
<style>
body {margin:0;font-family:Arial;background:#f8e1e7;}
.nav {background:#e91e63;color:white;padding:15px;display:flex;gap:20px;}
.container {padding:20px;}
.card {background:white;padding:20px;border-radius:10px;margin-top:20px;}
table {width:100%;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:10px;}
button{background:#e91e63;color:white;border:none;padding:8px;}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('teachers')">Преподаватели</div>
  <div onclick="show('groups')">Группы</div>
</div>

<div class="container">

<div id="teachers" class="card">
<h2>Преподаватели</h2>

<input id="name" placeholder="Имя">
<button onclick="addTeacher()">Добавить</button>

<table>
<tr><th>Имя</th></tr>
<tbody id="teachersTable"></tbody>
</table>
</div>

<div id="groups" class="card" style="display:none">
<h2>Группы</h2>

<input id="groupName" placeholder="Название">
<button onclick="createGroup()">Создать</button>

<button onclick="generateSchedule()">Создать расписание</button>

<table>
<tr><th>Название</th></tr>
<tbody id="groupsTable"></tbody>
</table>
</div>

</div>

<script>
const API="https://eduflow-92s4.onrender.com";

function show(id){
  teachers.style.display="none";
  groups.style.display="none";
  document.getElementById(id).style.display="block";
}

async function addTeacher(){
  let res = await fetch(API+"/add-teacher",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:name.value,
      schoolId:localStorage.getItem("schoolId")
    })
  });

  let data = await res.json();
  alert("Логин: "+data.login+" Пароль: "+data.password);
}

async function createGroup(){
  await fetch(API+"/create-group",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:groupName.value,
      schoolId:localStorage.getItem("schoolId")
    })
  });

  alert("Создано");
}

async function generateSchedule(){
  let groupId = prompt("ID группы");

  await fetch(API+"/generate-schedule",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      groupId,
      schoolId:localStorage.getItem("schoolId")
    })
  });

  alert("Готово");
}
</script>

</body>
</html>
