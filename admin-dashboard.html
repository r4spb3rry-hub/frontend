<!DOCTYPE html>
<html>
<body>

<h1>Администратор учебного заведения</h1>

<input id="schoolName" placeholder="Название школы">
<button onclick="createSchool()">Создать учебное заведение</button>

<p id="schoolId"></p>

<script>
const API = "https://eduflow-92s4.onrender.com";

async function createSchool() {
  let name = document.getElementById("schoolName").value;

  let res = await fetch(API + "/create-school", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name })
  });

  let data = await res.json();

  document.getElementById("schoolId").innerText =
    "ID школы: " + data.schoolId;
}
</script>

</body>
</html>
