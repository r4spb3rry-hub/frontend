<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход для администратора</title>
  <style>
    body {
      font-family: Arial;
      background: #f44336;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #f44336;
      color: white;
      border: none;
    }

    a {
      display: block;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>Вход администратора</h2>
    <input type="text" placeholder="Логин">
    <input type="password" placeholder="Пароль">
    <button onclick="login()">Войти</button>
    <a href="index.html">Назад</a>
  </div>

  <script>
    function login() {
      alert("Вход выполнен (пока без проверки)");
    }
  </script>
</body>
</html>
