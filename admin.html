<!DOCTYPE html>
<html>
<head>
<style>
body {background:#f8e1e7;text-align:center;font-family:Arial;}
.box {background:white;width:300px;margin:100px auto;padding:30px;border-radius:10px;}
input,button{width:90%;padding:10px;margin:10px;}
button{background:#e91e63;color:white;border:none;}
</style>
</head>

<body>

<div class="box">
<h2>Администратор</h2>

<input id="login" placeholder="Логин">
<input id="password" placeholder="Пароль">

<button onclick="login()">Войти</button>
</div>

<script>
const API="https://eduflow-92s4.onrender.com";

async function login(){
  let res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      login:login.value,
      password:password.value
    })
  });

  let data=await res.json();

  if(data.status==="ok"){
    localStorage.setItem("user",data.user.login);
    localStorage.setItem("role",data.user.role);
    localStorage.setItem("schoolId",data.user.schoolId);

    if(data.user.login==="administrator"){
      window.location.href="owner.html";
    } else {
      window.location.href="admin-dashboard.html";
    }
  }
}
</script>

</body>
</html>
