<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>EduFlow</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f8e1e7;
  text-align: center;
}

.box {
  background: #ffffff;
  padding: 40px;
  margin: 100px auto;
  width: 300px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #e91e63;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Выберите вашу роль</h2>

  <button onclick="go('student')">Учащийся</button>
  <button onclick="go('teacher')">Преподаватель</button>
  <button onclick="go('admin')">Администратор</button>
</div>

<script>
function go(role){
  window.location.href = role + ".html";
}
</script>

</body>
</html>
