<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {margin:0;font-family:Arial;background:#f8e1e7;}

.nav {
  background:#e91e63;
  color:white;
  padding:15px;
  display:flex;
  gap:20px;
}

.nav div {cursor:pointer;}

.container {padding:20px;}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ddd;
  padding:10px;
}

button {
  background:#e91e63;
  color:white;
  border:none;
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('schools')">Школы</div>
  <div onclick="show('users')">Пользователи</div>
  <div onclick="show('groups')">Группы</div>
</div>

<div class="container">

<div id="schools" class="card">
<h2>Учебные заведения</h2>

<input id="schoolName" placeholder="Название">
<input id="adminName" placeholder="Админ">
<button onclick="createSchool()">Создать</button>

<table>
<tr><th>Название</th><th>ID</th></tr>
<tbody id="schoolsTable"></tbody>
</table>
</div>

<div id="users" class="card" style="display:none">
<h2>Пользователи</h2>
<table>
<tr><th>Имя</th><th>Роль</th></tr>
<tbody id="usersTable"></tbody>
</table>
</div>

<div id="groups" class="card" style="display:none">
<h2>Группы</h2>
<table>
<tr><th>Название</th></tr>
<tbody id="groupsTable"></tbody>
</table>
</div>

</div>

<script>
const API="https://eduflow-92s4.onrender.com";

function show(id){
  ["schools","users","groups"].forEach(x=>{
    document.getElementById(x).style.display="none";
  });
  document.getElementById(id).style.display="block";
}

async function createSchool(){
  let res = await fetch(API+"/create-school",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      schoolName:schoolName.value,
      adminName:adminName.value
    })
  });

  let data = await res.json();
  alert("ID: "+data.schoolId);

  load();
}

async function load(){
  let res = await fetch(API+"/all-data");
  let data = await res.json();

  schoolsTable.innerHTML = data.schools.map(s =>
    <tr><td>${s.name}</td><td>${s._id}</td></tr>
  ).join("");

  usersTable.innerHTML = data.users.map(u =>
    <tr><td>${u.name}</td><td>${u.role}</td></tr>
  ).join("");

  groupsTable.innerHTML = data.groups.map(g =>
    <tr><td>${g.name}</td></tr>
  ).join("");
}

load();
</script>

</body>
</html>
