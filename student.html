<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Учащийся</title>
</head>

<body>
  <h2>Учащийся</h2>

  <input id="login" placeholder="Логин"><br><br>
  <input id="password" type="password" placeholder="Пароль"><br><br>
  <input id="schoolId" placeholder="ID школы">

  <button onclick="login()">Войти</button>
  <button onclick="register()">Зарегистрироваться</button>

  <p id="error" style="color:red;"></p>

  <script>
    const API = "https://eduflow-92s4.onrender.com";

    async function login() {
      let login = document.getElementById("login").value;
      let password = document.getElementById("password").value;

      let res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ login, password })
      });

      let data = await res.json();

      if (data.status === "ok") {
        localStorage.setItem("user", data.login);
        localStorage.setItem("role", data.role);

        if (data.role === "student") {
          window.location.href = "student-dashboard.html";
        } else if (data.role === "teacher") {
          window.location.href = "teacher-dashboard.html";
        } else if (data.role === "admin") {
          window.location.href = "admin-dashboard.html";
        }

      } else {
        document.getElementById("error").innerText = "Ошибка входа";
      }
    }

    async function register() {
      let login = document.getElementById("login").value;
      let password = document.getElementById("password").value;

      await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          login,
          password,
          role: "student"
        })
      });

      alert("Пользователь создан");
    }
  </script>
</body>
</html>
