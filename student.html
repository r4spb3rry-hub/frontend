<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  background: #f8e1e7;
  font-family: Arial;
  text-align: center;
}

.box {
  background: white;
  width: 300px;
  margin: 100px auto;
  padding: 30px;
  border-radius: 10px;
}

input, button {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  background: #e91e63;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="box">
<h2>Учащийся</h2>

<input id="login" placeholder="Логин">
<input id="password" type="password" placeholder="Пароль">
<input id="schoolId" placeholder="ID школы">

<button onclick="register()">Регистрация</button>
<button onclick="login()">Вход</button>
</div>

<script>
const API = "https://eduflow-92s4.onrender.com";

async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      login:login.value,
      password:password.value,
      role:"student",
      schoolId:schoolId.value
    })
  });
  alert("Готово");
}

async function login(){
  let res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      login:login.value,
      password:password.value
    })
  });

  let data = await res.json();

  if(data.status==="ok"){
    localStorage.setItem("user",data.user.login);
    localStorage.setItem("role",data.user.role);
    localStorage.setItem("schoolId",data.user.schoolId);

    window.location.href="student-dashboard.html";
  }
}
</script>

</body>
</html>
