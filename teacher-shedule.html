<!DOCTYPE html>
<html>
<head>
<style>
body {background:#f8e1e7;font-family:Arial;text-align:center;}
</style>
</head>

<body>

<h1>Расписание преподавателя</h1>

<div id="schedule"></div>

<script>
const API="https://eduflow-92s4.onrender.com";

async function load(){
  let groupId = prompt("Введите ID группы");

  let res = await fetch(API+"/schedule?groupId="+groupId);
  let data = await res.json();

  let html="";

  data.forEach(l=>{
    html += <p>${l.date} ${l.time} ${l.subject}</p>;
  });

  schedule.innerHTML = html;
}

load();
</script>

</body>
</html>
