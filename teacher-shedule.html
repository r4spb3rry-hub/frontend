<!DOCTYPE html>
<html>
<head>
<style>
body {background:#f8e1e7;font-family:Arial;}
table {width:90%;margin:50px auto;background:white;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:10px;text-align:center;}
button{background:#e91e63;color:white;border:none;padding:5px;}
</style>
</head>

<body>

<h2 style="text-align:center;">Расписание преподавателя</h2>

<table>
<tr>
<th>Дата</th>
<th>Время</th>
<th>Предмет</th>
<th>Кабинет</th>
<th></th>
</tr>
<tbody id="table"></tbody>
</table>

<script>
const API="https://eduflow-92s4.onrender.com";

async function load(){
  let groupId = prompt("ID группы");

  let res = await fetch(API+"/schedule?groupId="+groupId);
  let data = await res.json();

  table.innerHTML = data.map(l=>{
    let d = new Date(l.date).toLocaleDateString();

    return `<tr>
      <td>${d}</td>
      <td>${l.time}</td>
      <td>${l.subject}</td>
      <td>${l.room}</td>
      <td><button onclick="cancel('${l._id}')">Больничный</button></td>
    </tr>`;
  }).join("");
}

async function cancel(id){
  await fetch(API+"/cancel-lesson",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({lessonId:id})
  });

  load();
}

load();
</script>

</body>
</html>
