<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Преподаватель</title>
</head>

<body>
  <h2>Преподаватель</h2>

<input id="login" placeholder="Логин"><br>
<input id="password" placeholder="Пароль"><br>
<input id="schoolId" placeholder="ID школы"><br>

<button onclick="register()">Вход</button>

<script>
const API = "https://eduflow-92s4.onrender.com";

async function register() {
  let login = document.getElementById("login").value;
  let password = document.getElementById("password").value;
  let schoolId = document.getElementById("schoolId").value;

  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      login,
      password,
      role: "teacher",
      schoolId
    })
  });

  alert("Готово");
}
</script>
</body>
</html>
