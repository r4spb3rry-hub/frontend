<!DOCTYPE html>
<html>
<head>
<style>
body {background:#f8e1e7;text-align:center;font-family:Arial;}
.box {background:white;width:300px;margin:100px auto;padding:30px;border-radius:10px;}
input,button{width:90%;padding:10px;margin:10px;}
button{background:#e91e63;color:white;border:none;}
</style>
</head>

<body>

<div class="box">
<h2>Преподаватель</h2>

<input id="login" placeholder="Логин">
<input id="password" placeholder="Пароль">
<input id="schoolId" placeholder="ID школы">

<button onclick="register()">Регистрация</button>
</div>

<script>
const API="https://eduflow-92s4.onrender.com";

async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      login:login.value,
      password:password.value,
      role:"teacher",
      schoolId:schoolId.value
    })
  });

  alert("Готово");
}
</script>

</body>
</html>
